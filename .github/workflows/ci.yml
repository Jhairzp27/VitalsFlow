name: VitalsFlow CI/CD Pipeline

# El "Trigger"
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Extraer código del repositorio
      uses: actions/checkout@v3

    - name: 🐍 Configurar entorno Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 📦 Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🧪 Verificación de Integridad del Código (CI)
      run: |
        # Esto verifica que el código de Python compile sin errores críticos
        python -m compileall .
        
    - name: ✅ Pipeline completado exitosamente
      run: echo "El código está listo y validado para su despliegue en Streamlit Cloud."